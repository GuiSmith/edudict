services:
  edudict-db:
    image: postgres:latest
    container_name: edudict-dev-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT_DEV}:${DB_PORT}"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edudict-network

  edudict-back:
    image: node:20-alpine
    container_name: edudict-dev-back
    working_dir: /app
    volumes:
      - ../back:/app
      - back-node-modules:/app/node_modules
    env_file:
      - .env
    ports:
      - "${BACK_HOST_PORT_DEV}:3000"
    depends_on:
      edudict-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edudict-network
      - student-approval-network
    command: sh -c "npm install && npm run dev"

  edudict-front:
    image: node:20-alpine
    container_name: edudict-dev-front
    working_dir: /app
    volumes:
      - ../front:/app
      - front-node-modules:/app/node_modules
    ports:
      - "${FRONT_HOST_PORT_DEV}:3000"
    depends_on:
      edudict-back:
        condition: service_healthy
    networks:
      - edudict-network
    command: sh -c "npm install && npm run dev"

volumes:
  db-data:
  back-node-modules:
  front-node-modules:

networks:
  edudict-network:
    driver: bridge
  student-approval-network:
    external: true
