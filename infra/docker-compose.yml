services:
  edudict-db:
    image: postgres:latest
    container_name: edudict-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT}:${DB_PORT}"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edudict-network

  edudict-back:
    build:
      context: ../back
      dockerfile: Dockerfile
    container_name: edudict-back
    env_file:
      - .env
    ports:
      - "${BACK_HOST_PORT}:3000"
    depends_on:
      edudict-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edudict-network

  edudict-front:
    build:
      context: ../front
      dockerfile: Dockerfile
    container_name: edudict-front
    restart: unless-stopped
    ports:
      - "${FRONT_HOST_PORT}:80"
    depends_on:
      edudict-back:
        condition: service_healthy
    networks:
      - edudict-network

volumes:
  db-data:
  back-node-modules:
  front-node-modules:

networks:
  edudict-network:
    driver: bridge
