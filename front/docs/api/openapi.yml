openapi: 3.1.0
info:
  title: edudict API
  version: 0.1.0
  description: API REST do sistema edudict.
servers:
  - url: http://localhost:3000
    description: Ambiente local do back-end
tags:
  - name: Auth
    description: Autenticacao de usuarios.
  - name: Predict
    description: Predicao de aprovacao de estudante.
  - name: Usuarios
    description: Gerenciamento de usuarios.
paths:
  /predict:
    post:
      tags:
        - Predict
      security:
        - bearerAuth: []
        - cookieAuth: []
        - guestSession: []
      summary: Predizer aprovacao de estudante
      description: Valida os dados do estudante no backend, encaminha o payload para o servico Python student-approval em /predict, persiste os dados enviados, o resultado e a identidade do solicitante, e retorna a predicao calculada. Aceita usuario autenticado ou convidado identificado pelo header X-Guest-Session-Id.
      operationId: predictStudentApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentApprovalPredictionRequest"
            examples:
              payloadValido:
                value:
                  school: GP
                  sex: F
                  age: 17
                  address: U
                  famsize: GT3
                  Pstatus: T
                  Medu: 4
                  Fedu: 4
                  Mjob: teacher
                  Fjob: other
                  reason: course
                  guardian: mother
                  traveltime: 1
                  studytime: 2
                  failures: 0
                  schoolsup: "no"
                  famsup: "yes"
                  paid: "no"
                  activities: "yes"
                  nursery: "yes"
                  higher: "yes"
                  internet: "yes"
                  romantic: "no"
                  famrel: 4
                  freetime: 3
                  goout: 3
                  Dalc: 1
                  Walc: 1
                  health: 5
                  absences: 4
                  subject: math
      responses:
        "200":
          description: Predicao calculada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentApprovalPredictionResponse"
              examples:
                aprovado:
                  value:
                    success: true
                    prediction: 1
                    label: approved
                    probabilities:
                      approved: 0.82
                      not_approved: 0.18
        "400":
          description: Payload invalido no backend ou recusado pelo servico de predicao.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                dadosInvalidos:
                  value:
                    error: Dados inválidos para predição
                    details:
                      errors:
                        - field: age
                          message: Value must be an integer between 15 and 22.
                          received: 30
        "401":
          description: Autenticacao ou sessao de convidado nao realizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                autenticacaoNaoRealizada:
                  value:
                    error: Autenticação ou sessão de convidado não realizada
        "502":
          description: Falha ao comunicar com o servico Python de predicao.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                servicoIndisponivel:
                  value:
                    error: Serviço de predição indisponível
                    details:
                      service: student-approval
                      reason: connection_error
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /auth/me:
    get:
      tags:
        - Auth
      security:
        - bearerAuth: []
        - cookieAuth: []
      summary: Verificar usuario autenticado
      description: Verifica se o token informado ainda e valido e retorna o usuario autenticado.
      operationId: verificarAutenticacao
      responses:
        "200":
          description: Usuario autenticado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
              examples:
                autenticado:
                  value:
                    id: 1
                    nome: Maria Silva
                    cpf: "12345678901"
                    email: maria.silva@example.com
                    ativo: true
        "401":
          description: Autenticacao nao realizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                autenticacaoNaoRealizada:
                  value:
                    error: Autenticação não realizada
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Autentica o usuario por CPF ou e-mail, cria o token de autenticacao, retorna o cookie e registra o token criado no log da aplicacao.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              loginPorEmail:
                summary: Login por e-mail
                value:
                  login: maria.silva@example.com
                  password: senha-segura
              loginPorCpf:
                summary: Login por CPF
                value:
                  login: "123.456.789-01"
                  password: senha-segura
      responses:
        "200":
          description: Usuario autenticado.
          headers:
            Set-Cookie:
              description: Cookie httpOnly de autenticacao com duracao de 8 horas.
              schema:
                type: string
                example: token=abc123; Max-Age=28800; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                usuarioAutenticado:
                  value:
                    usuario:
                      id: 1
                      nome: Maria Silva
                      cpf: "12345678901"
                      email: maria.silva@example.com
                      ativo: true
        "400":
          description: Campos obrigatorios ausentes ou dados invalidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposObrigatoriosAusentes:
                  value:
                    error: Campos obrigatórios ausentes
                    details:
                      fields:
                        - login
                        - password
        "401":
          description: Credenciais invalidas ou login ambiguo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                naoAutorizado:
                  value:
                    error: Não autorizado
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Encerra a autenticacao no navegador, inativa o token utilizado, remove o cookie de autenticacao e registra a alteracao do token no log da aplicacao.
      operationId: logout
      responses:
        "204":
          description: Logout realizado.
          headers:
            Set-Cookie:
              description: Cookie de autenticacao expirado.
              schema:
                type: string
                example: token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; HttpOnly; SameSite=Lax
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /usuarios:
    post:
      tags:
        - Usuarios
      summary: Criar usuario
      description: Cria um novo usuario por auto cadastro publico, registra a criacao no log da aplicacao e retorna os dados publicos do cadastro.
      operationId: criarUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarUsuarioRequest"
            examples:
              usuarioAtivo:
                summary: Usuario ativo
                value:
                  nome: Maria Silva
                  cpf: "12345678901"
                  email: maria.silva@example.com
                  senha: senha-segura
      responses:
        "201":
          description: Usuario criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
              examples:
                usuarioCriado:
                  value:
                    id: 1
                    nome: Maria Silva
                    cpf: "12345678901"
                    email: maria.silva@example.com
                    ativo: true
        "400":
          description: Campos obrigatorios ausentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposObrigatoriosAusentes:
                  value:
                    error: Campos obrigatorios ausentes
                    details:
                      fields:
                        - nome
                        - cpf
                cpfInvalido:
                  value:
                    error: CPF inválido
                    details:
                      fields:
                        - cpf
                emailInvalido:
                  value:
                    error: E-mail inválido
                    details:
                      fields:
                        - email
        "409":
          description: Usuario ja cadastrado com o mesmo CPF ou e-mail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                usuarioJaCadastrado:
                  value:
                    error: Usuário já cadastrado
                    details:
                      fields:
                        - cpf
                        - email
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
    put:
      tags:
        - Usuarios
      security:
        - bearerAuth: []
        - cookieAuth: []
      summary: Editar usuario
      description: Atualiza parcialmente um usuario existente, registra a alteracao no log da aplicacao e retorna os dados publicos atualizados sem senha.
      operationId: editarUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditarUsuarioRequest"
            examples:
              editarNome:
                summary: Editar nome
                value:
                  id: 1
                  nome: Maria Souza
              inativarUsuario:
                summary: Inativar usuario
                value:
                  id: 1
                  ativo: false
      responses:
        "200":
          description: Usuario atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditarUsuarioResponse"
              examples:
                usuarioAtualizado:
                  value:
                    mensagem: Usuário atualizado com sucesso
                    usuario:
                      id: 1
                      nome: Maria Souza
                      cpf: "12345678901"
                      email: maria.silva@example.com
                      ativo: false
        "400":
          description: Dados invalidos ou nenhum campo de atualizacao enviado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                idAusente:
                  value:
                    error: Campos obrigatórios ausentes
                    details:
                      fields:
                        - id
                ativoInvalido:
                  value:
                    error: Ativo inválido
                    details:
                      fields:
                        - ativo
                semAlteracao:
                  value:
                    error: Informe ao menos um campo para atualização
                    details:
                      fields:
                        - nome
                        - cpf
                        - email
                        - senha
                        - ativo
        "401":
          description: Autenticacao nao realizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                autenticacaoNaoRealizada:
                  value:
                    error: Autenticação não realizada
        "404":
          description: Usuario nao encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                usuarioNaoEncontrado:
                  value:
                    error: Usuário não encontrado
                    details:
                      fields:
                        - id
        "409":
          description: CPF ou e-mail ja cadastrado para outro usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                usuarioJaCadastrado:
                  value:
                    error: Usuário já cadastrado
                    details:
                      fields:
                        - cpf
                        - email
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token informado no header Authorization.
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Token informado no cookie httpOnly `token`.
    guestSession:
      type: apiKey
      in: header
      name: X-Guest-Session-Id
      description: UUID que identifica uma sessao visitante nas rotas que aceitam convidados.
  schemas:
    StudentApprovalPredictionRequest:
      type: object
      additionalProperties: false
      required:
        - school
        - sex
        - age
        - address
        - famsize
        - Pstatus
        - Medu
        - Fedu
        - Mjob
        - Fjob
        - reason
        - guardian
        - traveltime
        - studytime
        - failures
        - schoolsup
        - famsup
        - paid
        - activities
        - nursery
        - higher
        - internet
        - romantic
        - famrel
        - freetime
        - goout
        - Dalc
        - Walc
        - health
        - absences
        - subject
      properties:
        school:
          type: string
          enum: [GP, MS]
        sex:
          type: string
          enum: [F, M]
        age:
          type: integer
          minimum: 15
          maximum: 22
        address:
          type: string
          enum: [U, R]
        famsize:
          type: string
          enum: [LE3, GT3]
        Pstatus:
          type: string
          enum: [T, A]
        Medu:
          type: integer
          minimum: 0
          maximum: 4
        Fedu:
          type: integer
          minimum: 0
          maximum: 4
        Mjob:
          type: string
          enum: [teacher, health, services, at_home, other]
        Fjob:
          type: string
          enum: [teacher, health, services, at_home, other]
        reason:
          type: string
          enum: [home, reputation, course, other]
        guardian:
          type: string
          enum: [mother, father, other]
        traveltime:
          type: integer
          minimum: 1
          maximum: 4
        studytime:
          type: integer
          minimum: 1
          maximum: 4
        failures:
          type: integer
          minimum: 0
          maximum: 4
        schoolsup:
          type: string
          enum: ["yes", "no"]
        famsup:
          type: string
          enum: ["yes", "no"]
        paid:
          type: string
          enum: ["yes", "no"]
        activities:
          type: string
          enum: ["yes", "no"]
        nursery:
          type: string
          enum: ["yes", "no"]
        higher:
          type: string
          enum: ["yes", "no"]
        internet:
          type: string
          enum: ["yes", "no"]
        romantic:
          type: string
          enum: ["yes", "no"]
        famrel:
          type: integer
          minimum: 1
          maximum: 5
        freetime:
          type: integer
          minimum: 1
          maximum: 5
        goout:
          type: integer
          minimum: 1
          maximum: 5
        Dalc:
          type: integer
          minimum: 1
          maximum: 5
        Walc:
          type: integer
          minimum: 1
          maximum: 5
        health:
          type: integer
          minimum: 1
          maximum: 5
        absences:
          type: integer
          minimum: 0
          maximum: 93
        subject:
          type: string
          enum: [math, portuguese]
    StudentApprovalPredictionResponse:
      type: object
      required:
        - success
        - prediction
        - label
        - probabilities
      properties:
        success:
          type: boolean
          example: true
        prediction:
          oneOf:
            - type: integer
            - type: string
          example: 1
        label:
          type: string
          example: approved
        probabilities:
          type: object
          additionalProperties:
            type: number
            format: float
          example:
            approved: 0.82
            not_approved: 0.18
    LoginRequest:
      type: object
      additionalProperties: true
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: CPF ou e-mail do usuario. Quando CPF, pode ser enviado formatado.
          example: maria.silva@example.com
        password:
          type: string
          format: password
          example: senha-segura
    LoginResponse:
      type: object
      required:
        - usuario
      properties:
        usuario:
          $ref: "#/components/schemas/Usuario"
    CriarUsuarioRequest:
      type: object
      additionalProperties: true
      required:
        - nome
        - cpf
        - email
        - senha
      properties:
        nome:
          type: string
          example: Maria Silva
        cpf:
          type: string
          description: CPF pode ser enviado formatado, mas sera salvo apenas com numeros.
          minLength: 11
          maxLength: 11
          pattern: "^\\d{11}$"
          example: "12345678901"
        email:
          type: string
          format: email
          example: maria.silva@example.com
        senha:
          type: string
          format: password
          example: senha-segura
    EditarUsuarioRequest:
      type: object
      additionalProperties: true
      description: >
        O campo id é obrigatório. Envie ao menos um dos campos editáveis
        opcionais: nome, cpf, email, senha ou ativo.
      required:
        - id
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        nome:
          type: string
          description: Nome sem espacos nas extremidades e nao vazio.
          example: Maria Souza
        cpf:
          type: string
          description: CPF pode ser enviado formatado, mas sera salvo apenas com numeros.
          minLength: 11
          maxLength: 11
          pattern: "^\\d{11}$"
          example: "12345678901"
        email:
          type: string
          format: email
          example: maria.souza@example.com
        senha:
          type: string
          format: password
          description: Sera criptografada antes de persistir.
          example: nova-senha-segura
        ativo:
          type: boolean
          example: false
    EditarUsuarioResponse:
      type: object
      required:
        - mensagem
        - usuario
      properties:
        mensagem:
          type: string
          example: Usuário atualizado com sucesso
        usuario:
          $ref: "#/components/schemas/Usuario"
    Usuario:
      type: object
      required:
        - id
        - nome
        - cpf
        - email
        - ativo
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Maria Silva
        cpf:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
        email:
          type: string
          format: email
          example: maria.silva@example.com
        ativo:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Campos obrigatorios ausentes
        details:
          type: object
          additionalProperties: true
